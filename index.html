<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Carlos Ruiz</title>
  <meta name="description" content="Carlos Ruiz — designer & creative technologist. Abstract works and digital craft.">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes floatSoft {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    @keyframes slideLine {
      0% { transform: translateY(-50%) scaleX(0); opacity: 0; }
      100% { transform: translateY(-50%) scaleX(1); opacity: 1; }
    }
    body {
      animation: fadeIn 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.1) forwards;
      background-color: #f5f5f5;
    }
    .card {
      animation: floatSoft 6s ease-in-out infinite;
      transition: transform 0.25s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: scale(1.02);
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15);
    }
    .line-slice {
      animation: slideLine 0.7s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
    }
    @media (max-width: 768px) {
      .line-slice {
        display: none;
      }
    }
    button, a {
      cursor: pointer;
    }
  </style>
</head>
